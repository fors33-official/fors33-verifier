# 5GB progress test — runs only on manual dispatch or version tag push.
# Does NOT run on every PR (would bottleneck CI and waste compute).
name: 5GB Progress Test

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  five-gb-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          pip install .
          pip install pytest

      - name: Create 5GB sparse file and run progress test
        env:
          RUN_5GB_TEST: '1'
        run: |
          python -m pytest tests/test_large_file_progress.py -v -m slow
        timeout-minutes: 15
